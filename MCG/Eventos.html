<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Eventos</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    padding-top:90px;
    background:#f5f5f5;
}

/* ENCABEZADO */

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:#003366;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 40px;
    z-index:1000;
}

.logo{
    color:white;
    font-size:28px;
    font-weight:bold;
}

nav{
    display:flex;
    align-items:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    font-weight:600;
    transition:.3s;
}

nav a:hover{
    color:#ffd700;
}

/* TÍTULO */

.titulo-eventos{
    text-align:center;
    color:#003366;
    font-size:3rem;
    margin:30px 0;
}

/* SECCIONES */

.seccion-evento{
    padding:40px 60px;
}

.seccion-evento h2{
    color:#003366;
    margin-bottom:25px;
}

/* GALERÍA */

.galeria{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:20px;
}

.galeria img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:15px;
    cursor:pointer;
    transition:.4s;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}

.galeria img:hover{
    transform:scale(1.05);
}

</style>

</head>

<body>

<header>

<div class="logo">
    Manuel Córdova Galarza
</div>

<nav>
    <a href="index.html">Inicio</a>
    <a href="nosotros.html">Nosotros</a>
    <a href="eventos.html">Eventos</a>
    <a href="contacto.html">Contacto</a>
    <a href="documentos.html">Documentos</a>
</nav>

</header>

<h1 class="titulo-eventos">📸 Eventos Institucionales</h1>

<!-- FERIA DE CIENCIAS -->

<section id="ciencias" class="seccion-evento">

<h2>🔬 Feria de Ciencias</h2>

<div class="galeria">

<img src="img/ciencias/1.jpg">
<img src="img/ciencias/2.jpg">
<img src="img/ciencias/3.jpg">
<img src="img/ciencias/7.jpg">

</div>

</section>

<!-- DEPORTES -->

<section id="deportes" class="seccion-evento">

<h2>🏆 Juegos Deportivos</h2>

<div class="galeria">

<img src="img/deporte/1.jpg">
<img src="img/deporte/2.jpg">
<img src="img/deporte/3.jpg">
<img src="img/deporte/4.jpg">

</div>

</section>

<!-- GRADUACIÓN -->

<section id="graduacion" class="seccion-evento">

<h2>🎓 Graduación</h2>

<div class="galeria">

<img src="img/graduacion/8.jpg">
<img src="img/graduacion/5.jpg">
<img src="img/graduacion/7.jpg">
<img src="img/graduacion/2.jpg">

</div>

</section>

</body>
</html>
